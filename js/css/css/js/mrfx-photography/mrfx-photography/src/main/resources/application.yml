server:
  port: 8080

spring:

  datasource:

    url: jdbc:mysql://localhost:3306/mrfxdb

    username: root

    password: root

    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:

      hibernate:

        format_sql: true

  servlet:

    multipart:

      enabled: true

      max-file-size: 100MB

      max-request-size: 500MB

  mail:

    host: smtp.gmail.com

    port: 587

    username: yourmail@gmail.com

    password: YOUR_APP_PASSWORD

    properties:

      mail:

        smtp:

          auth: true

          starttls:

            enable: true

jwt:

  secret: MRFX_SECRET_KEY_2026_SUPER_SECURE

  expiration: 86400000

cloudinary:

  cloud-name: YOUR_CLOUD_NAME

  api-key: YOUR_API_KEY

  api-secret: YOUR_API_SECRET

razorpay:

  key-id: YOUR_RAZORPAY_KEY

  key-secret: YOUR_RAZORPAY_SECRET

file:

  upload-dir: uploads/

gallery:

  expiry-days: 30

frontend:

  url: http://localhost:5500

logging:

  level:

    org.springframework.security: DEBUG

    com.mrfx: INFO
