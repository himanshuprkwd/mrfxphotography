<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Customer Gallery | MRFX.ADITYA
</title>

<link rel="stylesheet"
href="css/gallery.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="gallery-header">

<div class="logo">

MRFX.ADITYA

</div>

<div class="customer-info">

<span id="gallery-id">

Gallery Access

</span>

</div>

</header>

<!-- HERO -->

<section class="hero-section">

<h1>

Your Memories

</h1>

<p>

View & Download Your Photos

</p>

</section>

<!-- CODE SECTION -->

<section class="code-section">

<div class="code-box">

<input
type="text"
id="accessCode"
placeholder="Enter Gallery Code">

<button
onclick="verifyCode()">

Access Gallery

</button>

</div>

</section>

<!-- GALLERY -->

<section
class="gallery-container">

<div
id="galleryGrid"
class="gallery-grid">

<!-- Photos Loaded Here -->

</div>

</section>

<!-- PHOTO MODAL -->

<div
id="photoModal"
class="modal">

<span
class="close"
onclick="closeModal()">

&times;

</span>

<img
id="modalImage">

<div
class="modal-actions">

<button
onclick="downloadPhoto()">

<i class="fa fa-download"></i>

Download

</button>

</div>

</div>

<!-- STATS -->

<section
class="gallery-stats">

<div class="stat-card">

<h2>
250+
</h2>

<p>
Photos
</p>

</div>

<div class="stat-card">

<h2>
4K
</h2>

<p>
Quality
</p>

</div>

<div class="stat-card">

<h2>
100%
</h2>

<p>
Secure
</p>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>

© 2026 MRFX.ADITYA Photography

</p>

</footer>

<script
src="js/gallery.js">

</script>

</body>
