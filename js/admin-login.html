<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
MRFX Admin Login
</title>

<link rel="stylesheet"
href="css/admin-login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<div class="logo">

MRFX.ADITYA

</div>

<h2>
Admin Login
</h2>

<form id="loginForm">

<div class="input-group">

<i class="fa fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter Email"
required>

</div>

<div class="input-group">

<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

</div>

<div class="options">

<label>

<input
type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

</form>

<div class="divider">

OR

</div>

<button
class="google-btn">

<i class="fab fa-google"></i>

Login With Google

</button>

<p class="security-text">

Secure Admin Access Powered By JWT Authentication

</p>

</div>

</div>

<script
src="js/admin-login.js">

</script>

</body>

</html>
